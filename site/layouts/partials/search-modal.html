<div id="site-search-modal" class="site-search-modal-container" aria-hidden="true" role="dialog">
  <div class="site-search-overlay" data-close-search></div>
  <div class="site-search-modal">
    <div class="site-search-header">
      <div class="site-search-input-wrapper">
        <span class="site-search-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </span>
        <input type="text" class="site-search-input" id="site-search-input"
          placeholder="Search designs, principles, deep dives..." aria-label="Search" autocomplete="off" />
        <button class="site-search-close" data-close-search aria-label="Close modal">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="lucide lucide-x">
            <path d="M18 6 6 18" />
            <path d="m6 6 12 12" />
          </svg>
        </button>
      </div>
    </div>
    <div class="site-search-body">
      <div id="site-search-default" class="site-search-default">
        <div class="site-search-quick-links">
          <a href="{{ relURL "categories/" }}" class="site-search-cta">
            <span class="site-search-cta-icon">📂</span>
            <span class="site-search-cta-text">All Categories</span>
          </a>
          <a href="{{ relURL "tags/" }}" class="site-search-cta">
            <span class="site-search-cta-icon">🏷️</span>
            <span class="site-search-cta-text">All Tags</span>
          </a>
        </div>
      </div>
      <div id="site-search-results-list" style="display: none;">
        <!-- Results injected here -->
      </div>
    </div>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    let searchIndex = null;
    let debounceTimer = null;
    const searchModal = document.getElementById('site-search-modal');
    const searchInput = document.getElementById('site-search-input');
    const searchDefault = document.getElementById('site-search-default');
    const searchResultsList = document.getElementById('site-search-results-list');
    const closeButtons = document.querySelectorAll('[data-close-search]');
    const openButtons = document.querySelectorAll('[data-open-search]');

    if (!searchModal) return;

    // Move modal to body end to avoid z-index/transform issues
    document.body.appendChild(searchModal);

    // Load search index (Hugo-generated index.json — flat array)
    let indexLoaded = false;
    function loadIndex() {
      if (indexLoaded) return;
      fetch('{{ "index.json" | relURL }}')
        .then(res => res.json())
        .then(data => {
          searchIndex = data;
          indexLoaded = true;
        })
        .catch(err => console.error('Failed to load search index:', err));
    }

    // Open Modal
    function openSearch() {
      loadIndex();
      searchModal.classList.add('active');
      searchModal.setAttribute('aria-hidden', 'false');
      document.documentElement.style.overflow = 'hidden';
      document.documentElement.style.overscrollBehavior = 'none';
      document.body.style.overflow = 'hidden';
      document.body.style.overscrollBehavior = 'none';
      setTimeout(() => {
        searchInput.focus();
        if (!searchInput.value.trim()) {
          searchDefault.style.display = 'block';
          searchResultsList.style.display = 'none';
        } else {
          performSearch(searchInput.value);
        }
      }, 50);
    }

    // Close Modal
    function closeSearch() {
      searchModal.classList.remove('active');
      searchModal.setAttribute('aria-hidden', 'true');
      document.documentElement.style.overflow = '';
      document.documentElement.style.overscrollBehavior = '';
      document.body.style.overflow = '';
      document.body.style.overscrollBehavior = '';
      searchInput.value = '';
      searchResultsList.innerHTML = '';
      searchDefault.style.display = 'block';
      searchResultsList.style.display = 'none';
    }

    openButtons.forEach(btn => {
      btn.addEventListener('click', (e) => { e.preventDefault(); openSearch(); });
    });

    closeButtons.forEach(btn => {
      btn.addEventListener('click', closeSearch);
    });

    // Splits a query string into lowercase terms, filtering out empty tokens.
    function tokenize(query) {
      return query.toLowerCase().trim().split(/\s+/).filter(Boolean);
    }

    // Returns how many times needle appears in haystack (non-overlapping, case-sensitive).
    function countOccurrences(haystack, needle) {
      if (!needle) return 0;
      let count = 0, pos = 0;
      while ((pos = haystack.indexOf(needle, pos)) !== -1) { count++; pos++; }
      return count;
    }

    // Computes a relevance score for a doc based on field weights and term frequency.
    function scoreDoc(doc, q, terms) {
      const title    = (doc.title || '').toLowerCase();
      const contents = (doc.contents || '').toLowerCase();
      const tags     = (doc.tags || []).join(' ').toLowerCase();
      let score = 0;

      // --- Exact-phrase signals (highest weight) ---
      if (title === q)            score += 200;
      else if (title.startsWith(q + ' ') || title.startsWith(q)) score += 80;
      else if (title.includes(q)) score += 40;
      if (tags.includes(q))       score += 25;
      // Content exact-phrase frequency (capped)
      score += Math.min(countOccurrences(contents, q) * 3, 15);

      // --- Per-term signals (multi-word support) ---
      if (terms.length > 1) {
        let allInTitle = true, allInAny = true;
        for (const term of terms) {
          const inTitle    = title.includes(term);
          const inTags     = tags.includes(term);
          const inContents = contents.includes(term);
          if (!inTitle) allInTitle = false;
          if (!inTitle && !inTags && !inContents) { allInAny = false; }
          if (inTitle)    score += 12;
          if (inTags)     score += 8;
          // term frequency in content, capped per term
          score += Math.min(countOccurrences(contents, term) * 1, 6);
        }
        // Bonus: all terms appear in title, or collectively across all fields
        if (allInTitle) score += 30;
        if (!allInAny)  score = 0; // require every term to appear somewhere (AND logic)
      }

      return score;
    }

    // Returns true only if every query term appears in at least one field (AND logic).
    function docMatches(doc, q, terms) {
      const title    = (doc.title || '').toLowerCase();
      const contents = (doc.contents || '').toLowerCase();
      const tags     = (doc.tags || []).join(' ').toLowerCase();
      // Each term must appear in at least one field
      return terms.every(term =>
        title.includes(term) || contents.includes(term) || tags.includes(term)
      );
    }

    // Extracts a content preview window centered on the first matching term position.
    function extractSnippet(text, q, terms, maxLen = 200) {
      const lower = text.toLowerCase();
      // Find first match position: prefer exact phrase, then first matching term
      let pos = q ? lower.indexOf(q) : -1;
      if (pos === -1) {
        for (const term of terms) {
          const p = lower.indexOf(term);
          if (p !== -1) { pos = p; break; }
        }
      }
      if (pos === -1) return text.slice(0, maxLen).trim() + (text.length > maxLen ? '…' : '');
      const start = Math.max(0, pos - 60);
      const end   = Math.min(text.length, start + maxLen);
      return (start > 0 ? '…' : '') + text.slice(start, end).trim() + (end < text.length ? '…' : '');
    }

    // Filters, scores, sorts, and renders search results for the given query.
    function performSearch(query) {
      if (!searchIndex) return;

      if (!query.trim()) {
        searchDefault.style.display = 'block';
        searchResultsList.style.display = 'none';
        searchResultsList.innerHTML = '';
        return;
      }

      searchDefault.style.display = 'none';
      searchResultsList.style.display = 'block';

      const q     = query.toLowerCase().trim();
      const terms = tokenize(query);

      const scored = searchIndex
        .filter(doc => docMatches(doc, q, terms))
        .map(doc => ({ doc, score: scoreDoc(doc, q, terms) }))
        .filter(({ score }) => score > 0)
        .sort((a, b) => b.score - a.score)
        .slice(0, 15);

      if (scored.length === 0) {
        searchResultsList.innerHTML = '<p class="site-search-no-results">No results found.</p>';
      } else {
        searchResultsList.innerHTML = scored.map(({ doc }) => {
          const preview  = extractSnippet(doc.contents || '', q, terms);
          const category = (doc.categories || [])[0] || '';
          const tags     = (doc.tags || []).map(t => `<span class="site-search-badge">${t}</span>`).join('');
          return `
            <a href="${doc.permalink}" class="site-search-result">
              <div class="site-search-result-title">${doc.title}</div>
              <div class="site-search-result-preview">${preview}</div>
              <div class="site-search-result-meta">
                ${category ? `<span class="site-search-badge-category">${category}</span>` : ''}
                ${tags}
              </div>
            </a>`;
        }).join('');
      }
    }

    searchInput.addEventListener('input', function (e) {
      if (debounceTimer) clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => performSearch(e.target.value), 300);
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', function (e) {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        if (!searchModal.classList.contains('active')) {
          openSearch();
        } else {
          closeSearch();
        }
      }
      if (e.key === 'Escape' && searchModal.classList.contains('active')) {
        closeSearch();
      }
    });
  });
</script>
